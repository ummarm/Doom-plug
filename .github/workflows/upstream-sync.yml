name: Upstream scraper sync

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run now even if today is outside the 4-day cadence"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync tracked upstream scrapers
        id: sync
        env:
          FORCE_SYNC: ${{ github.event.inputs.force || 'false' }}
          PR_BODY_PATH: .git/upstream-sync-pr-body.md
        run: python scripts/sync_upstream.py

      - name: Create pull request
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: |
            manifest.json
            providers/4khdhub.js
            providers/4khdhub_tv.js
            providers/hdhub4u.js
            providers/hindmoviez.js
          branch: automation/upstream-sync
          delete-branch: true
          commit-message: "chore: sync upstream Doom-plug scrapers"
          title: "chore: sync upstream Doom-plug scrapers"
          body-path: .git/upstream-sync-pr-body.md
